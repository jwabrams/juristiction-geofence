<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#ffffff">
<link rel="manifest" href="manifest.json">
<title>Jurisdiction Tracker</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/polylabel@1.1.0/dist/polylabel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; overflow: hidden; }

#map { position: fixed; inset: 0; z-index: 0; }
.leaflet-container { background: #e8e4dc !important; }

#floating-card {
  position: fixed; bottom: 24px; left: 16px; right: 16px;
  background: #fff; border-radius: 16px; padding: 14px 16px 12px;
  border: 0.5px solid #dde3ed; box-shadow: 0 2px 12px rgba(0,0,0,0.12);
  z-index: 1000;
}
#banner-label { font-size: 10px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: #7a8499; margin-bottom: 3px; }
#sector-name-wrap { overflow: hidden; width: 100%; }
#sector-name { font-size: 22px; font-weight: 700; color: #1a6abf; white-space: nowrap; line-height: 1.2; display: inline-block; }
#sector-name.unknown { color: #9aa0b0; font-style: italic; font-weight: 400; font-size: 18px; }
#sector-name.flash { animation: flash 0.7s ease; }
#sector-name.scrolling { animation: marquee 10s linear infinite; padding-right: 40px; }
@keyframes flash { 0%{background:rgba(26,106,191,0.12);border-radius:4px;padding-left:6px} 100%{background:transparent;padding-left:0} }
@keyframes marquee { 0%{transform:translateX(0)} 100%{transform:translateX(-100%)} }

#card-row { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; }
#status-bar { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #7a8499; flex: 1; min-width: 0; }
#gps-dot { width: 7px; height: 7px; border-radius: 50%; background: #b0b8c8; flex-shrink: 0; transition: background 0.3s; }
#gps-dot.active { background: #22a84a; animation: pulse 2s infinite; }
#gps-dot.error { background: #e03c3c; }
#gps-dot.warn { background: #c97f0a; }
#gps-status { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.45} }
#card-btns { display: flex; gap: 8px; margin-left: 10px; flex-shrink: 0; }

#alert-banner {
  display: none; position: fixed; top: 16px; left: 16px; right: 16px;
  background: #edfaf1; border: 1.5px solid #22a84a; border-radius: 12px;
  padding: 10px 16px; font-size: 13px; color: #1a7a3a; font-weight: 600; z-index: 1100;
}
#alert-banner.visible { display: block; animation: slideDown 0.3s ease; }
@keyframes slideDown { from{transform:translateY(-8px);opacity:0} to{transform:translateY(0);opacity:1} }

.ctrl-btn {
  width: 38px; height: 38px; background: #fff; border: 0.5px solid #dde3ed;
  border-radius: 8px; color: #1a1f2e; font-size: 16px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 1px 4px rgba(0,0,0,0.08);
}
.ctrl-btn:active { background: #f0f3f8; }

#splash {
  position: fixed; inset: 0; z-index: 9999; background: #f8f7f4;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px;
  overflow: hidden;
}
#splash svg.hex-bg { position: absolute; inset: 0; width: 100%; height: 100%; opacity: 0.15; }
#splash-icon { width: 72px; height: 72px; position: relative; z-index: 1; }
#splash h1 { font-size: 26px; font-weight: 700; color: #1a1f2e; z-index: 1; margin: 0; }
#splash p { font-size: 15px; color: #7a8499; z-index: 1; margin: 0; }
#splash button { padding: 14px 48px; background: #1a6abf; border: none; border-radius: 10px; color: #fff; font-size: 18px; font-weight: 600; cursor: pointer; -webkit-appearance: none; z-index: 1; margin-top: 4px; }

#config-overlay { display: none; position: fixed; inset: 0; z-index: 3000; }
#config-overlay.open { display: block; }
#config-panel {
  position: fixed; bottom: 110px; left: 16px; right: 16px;
  background: #fff; border-radius: 16px; padding: 16px 16px 20px;
  border: 0.5px solid #dde3ed; box-shadow: 0 4px 20px rgba(0,0,0,0.15);
  max-width: 500px; margin: 0 auto;
}
#config-panel h2 { font-size: 15px; font-weight: 600; margin-bottom: 16px; color: #1a1f2e; }
#close-cfg { float: right; background: none; border: none; color: #7a8499; font-size: 22px; cursor: pointer; line-height: 1; }
.chk-row { display: flex; align-items: center; gap: 12px; }
.chk-row input[type=checkbox] { width: 18px; height: 18px; accent-color: #1a6abf; flex-shrink: 0; }
.chk-row label { font-size: 14px; color: #1a1f2e; }

.sector-label { background: none; border: none; box-shadow: none; font-size: 11px; font-weight: 700; color: #1a6abf; text-align: center; white-space: nowrap; text-shadow: 1px 1px 0 #fff, -1px -1px 0 #fff, 1px -1px 0 #fff, -1px 1px 0 #fff; pointer-events: none; }
</style>
</head>
<body>

<script>
const FS_BASE = 'https://services1.arcgis.com/kILp9lqGUeOhnDbI/arcgis/rest/services/NFIP_Directory_v2/FeatureServer';
const LAYER   = 0;
const FIELD   = 'Name_Proper';

let cfg = { url: FS_BASE, layer: LAYER, field: FIELD, alertAny: true };
try { Object.assign(cfg, JSON.parse(localStorage.getItem('jurisCfg') || '{}')); } catch(e) {}
function saveCfg() { try { localStorage.setItem('jurisCfg', JSON.stringify(cfg)); } catch(e) {} }
function layerUrl() { return cfg.url + '/' + cfg.layer; }

const map = L.map('map', { zoomControl: false, attributionControl: false, tap: false });
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Base/MapServer/tile/{z}/{y}/{x}', { maxZoom: 16 }).addTo(map);
L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/Canvas/World_Light_Gray_Reference/MapServer/tile/{z}/{y}/{x}', { maxZoom: 16 }).addTo(map);
map.setView([35.9, -84.0], 9);
map.on('dragstart', function() { userPanned = true; });

let sectorLayer = null, labelLayer = null, locMarker = null, accCircle = null;
let currentSector = null, watchId = null, alertTimer = null, qTimer = null, initialFitDone = false;
let spokeSector = false, selectedVoice = null, userPanned = false;

function loadVoices() {
  if (!window.speechSynthesis) return;
  selectedVoice = window.speechSynthesis.getVoices().find(v => v.name === 'Samantha') || null;
}
if (window.speechSynthesis) { window.speechSynthesis.onvoiceschanged = loadVoices; loadVoices(); }

function speak(text) {
  if (!window.speechSynthesis) return;
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  if (selectedVoice) u.voice = selectedVoice;
  u.rate = 0.95; u.pitch = 1; u.volume = 1;
  window.speechSynthesis.speak(u);
}

function setDot(s) { document.getElementById('gps-dot').className = s; }
function setMsg(m, isError) {
  const el = document.getElementById('gps-status');
  el.style.color = isError ? '#e03c3c' : '#7a8499';
  el.style.fontWeight = isError ? '500' : '';
  el.style.fontFamily = (!isError && m.includes(',')) ? 'monospace' : '';
  el.textContent = m;
}

function featCentroid(feat) {
  const g = feat.geometry;
  try {
    let coords;
    if (g.type === 'Polygon') coords = g.coordinates;
    else if (g.type === 'MultiPolygon') coords = g.coordinates.reduce((a, b) => b[0].length > a[0].length ? b : a);
    if (coords) { const p = polylabel(coords, 0.001); return L.latLng(p[1], p[0]); }
  } catch(e) {}
  return L.geoJSON(feat).getBounds().getCenter();
}

async function reloadSectors() {
  if (sectorLayer) { map.removeLayer(sectorLayer); sectorLayer = null; }
  if (labelLayer)  { map.removeLayer(labelLayer);  labelLayer  = null; }
  setDot('warn'); setMsg('Loading…');
  const q = layerUrl() + '/query?where=1%3D1&outFields=' + encodeURIComponent(cfg.field) + '&returnGeometry=true&f=geojson';
  try {
    const res = await fetch(q);
    if (!res.ok) throw new Error('HTTP ' + res.status);
    const data = await res.json();
    if (data.error) throw new Error(data.error.message);
    const n = data.features ? data.features.length : 0;
    sectorLayer = L.geoJSON(data, {
      style: { color: '#1a6abf', weight: 2, opacity: 0.9, fillOpacity: 0.04, fillColor: '#1a6abf' },
      onEachFeature: function(feat, lyr) { lyr.on('click', function(e) { L.DomEvent.stopPropagation(e); }); }
    }).addTo(map);
    labelLayer = L.layerGroup();
    data.features.forEach(function(feat) {
      const name = feat.properties[cfg.field];
      if (!name || !feat.geometry) return;
      L.marker(featCentroid(feat), {
        icon: L.divIcon({ className: 'sector-label', html: name, iconSize: null }),
        interactive: false
      }).addTo(labelLayer);
    });
    labelLayer.addTo(map);
    map.on('zoomend', function() {
      const z = map.getZoom();
      z >= 10 ? (!map.hasLayer(labelLayer) && map.addLayer(labelLayer)) : (map.hasLayer(labelLayer) && map.removeLayer(labelLayer));
      z >= 10 ? (!map.hasLayer(sectorLayer) && map.addLayer(sectorLayer)) : (map.hasLayer(sectorLayer) && map.removeLayer(sectorLayer));
    });
    if (map.getZoom() < 10) { map.removeLayer(labelLayer); map.removeLayer(sectorLayer); }
    if (n > 0 && !locMarker) map.fitBounds(sectorLayer.getBounds(), { padding: [20, 20] });
    setDot('warn'); setMsg('Acquiring GPS…');
  } catch(e) { setDot('error'); setMsg('Layer load failed', true); console.error(e); }
}

function startGPS() {
  if (!navigator.geolocation) { setDot('error'); setMsg('Geolocation not supported', true); return; }
  if (watchId != null) navigator.geolocation.clearWatch(watchId);
  watchId = navigator.geolocation.watchPosition(onPos, function(e) {
    if (e.code === 3) {
      setMsg('Retrying…');
      if (watchId != null) navigator.geolocation.clearWatch(watchId);
      watchId = navigator.geolocation.watchPosition(onPos, onGpsErr, { enableHighAccuracy: false, maximumAge: 10000, timeout: 60000 });
    } else { onGpsErr(e); }
  }, { enableHighAccuracy: true, maximumAge: 4000, timeout: 15000 });
}

function onPos(pos) {
  const lat = pos.coords.latitude, lng = pos.coords.longitude, acc = pos.coords.accuracy;
  setDot('active');
  setMsg(lat.toFixed(5) + ', ' + lng.toFixed(5));
  const ll = [lat, lng];
  if (!locMarker) {
    locMarker = L.circleMarker(ll, { radius: 9, color: '#fff', fillColor: '#1a6abf', fillOpacity: 1, weight: 2.5, zIndexOffset: 1000 }).addTo(map);
    accCircle = L.circle(ll, { radius: acc, color: '#1a6abf', fillColor: '#1a6abf', fillOpacity: 0.08, weight: 0.5 }).addTo(map);
  } else {
    locMarker.setLatLng(ll);
    accCircle.setLatLng(ll).setRadius(acc);
  }
  clearTimeout(qTimer);
  qTimer = setTimeout(function() { doQuery(lat, lng); }, 600);
  if (!initialFitDone) {
    updateMapExtent(lat, lng);
  } else if (!userPanned) {
    map.setView(ll, map.getZoom(), { animate: true });
  }
}

function onGpsErr(e) {
  const m = { 1: 'Location permission denied', 2: 'Position unavailable', 3: 'GPS timed out' };
  setDot('error'); setMsg(m[e.code] || 'GPS error', true);
}

function updateMapExtent(lat, lng) {
  if (!sectorLayer) return;
  const pt = L.latLng(lat, lng);
  let minDist = Infinity;
  sectorLayer.eachLayer(function(lyr) {
    if (lyr.getBounds) {
      const b = lyr.getBounds();
      const nearest = L.latLng(Math.max(b.getSouth(), Math.min(lat, b.getNorth())), Math.max(b.getWest(), Math.min(lng, b.getEast())));
      const d = pt.distanceTo(nearest);
      if (d < minDist) minDist = d;
    }
  });
  if (minDist < 5000) {
    const bufferDeg = Math.max(0.01, minDist / 111000 * 3);
    map.fitBounds(L.latLngBounds([lat - bufferDeg, lng - bufferDeg], [lat + bufferDeg, lng + bufferDeg]), { padding: [40, 40], maxZoom: 14, animate: true });
  } else {
    map.fitBounds(sectorLayer.getBounds().extend(pt), { padding: [40, 40], maxZoom: 11, animate: true });
  }
  initialFitDone = true;
}

async function doQuery(lat, lng) {
  const geom = encodeURIComponent(JSON.stringify({ x: lng, y: lat, spatialReference: { wkid: 4326 } }));
  const url = layerUrl() + '/query?geometry=' + geom + '&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelWithin&outFields=' + encodeURIComponent(cfg.field) + '&returnGeometry=true&f=json';
  try {
    const data = await (await fetch(url)).json();
    if (!data.features || data.features.length === 0) { setSector(null); return; }
    let best = null, bestArea = Infinity;
    data.features.forEach(function(feat) {
      if (!feat.geometry || !feat.geometry.rings) return;
      let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;
      feat.geometry.rings.forEach(function(ring) {
        ring.forEach(function(pt) {
          if (pt[0] < minX) minX = pt[0]; if (pt[0] > maxX) maxX = pt[0];
          if (pt[1] < minY) minY = pt[1]; if (pt[1] > maxY) maxY = pt[1];
        });
      });
      const area = (maxX - minX) * (maxY - minY);
      if (area < bestArea) { bestArea = area; best = feat; }
    });
    setSector(best ? (best.attributes[cfg.field] || 'Unknown') : null);
  } catch(e) { console.warn('Query error:', e); }
}

function setSector(name) {
  const el = document.getElementById('sector-name');
  const wrap = document.getElementById('sector-name-wrap');
  const prev = currentSector;
  if (name === prev) {
    if (!spokeSector) {
      spokeSector = true;
      if (!name) { el.textContent = 'Outside jurisdiction coverage'; el.className = 'unknown'; speak('Outside jurisdiction coverage'); }
      else { el.textContent = name; el.className = ''; speak('Jurisdiction: ' + name); }
    }
    return;
  }
  currentSector = name;
  if (!name) {
    el.textContent = 'Outside jurisdiction coverage'; el.className = 'unknown';
    if (spokeSector) speak('Outside jurisdiction coverage');
    spokeSector = true; return;
  }
  el.textContent = name; el.className = '';
  void el.offsetWidth; el.classList.add('flash');
  requestAnimationFrame(function() {
    el.classList.remove('scrolling');
    if (el.scrollWidth > wrap.clientWidth) { el.classList.add('scrolling'); }
  });
  fireAlert(name);
  speak(spokeSector ? 'Entering ' + name : 'Jurisdiction: ' + name);
  spokeSector = true;
}

function fireAlert(name) {
  if (!cfg.alertAny) return;
  const ab = document.getElementById('alert-banner');
  document.getElementById('alert-text').textContent = name;
  ab.classList.add('visible');
  clearTimeout(alertTimer);
  alertTimer = setTimeout(function() { ab.classList.remove('visible'); }, 5000);
  if ('vibrate' in navigator) navigator.vibrate([80, 40, 80]);
}

function centerOnMe() {
  if (locMarker) { userPanned = false; map.setView(locMarker.getLatLng(), map.getZoom()); }
}

function openConfig() {
  document.getElementById('cfg-alert-any').checked = cfg.alertAny;
  document.getElementById('config-overlay').classList.add('open');
}
function closeConfig() {
  cfg.alertAny = document.getElementById('cfg-alert-any').checked;
  saveCfg();
  document.getElementById('config-overlay').classList.remove('open');
}

document.getElementById('start-btn').addEventListener('click', function() {
  if (window.speechSynthesis) { const u = new SpeechSynthesisUtterance(''); u.volume = 0; window.speechSynthesis.speak(u); }
  document.getElementById('splash').style.display = 'none';
  reloadSectors();
  startGPS();
});

window.addEventListener('resize', function() { map.invalidateSize(); });
document.getElementById('cfg-btn').addEventListener('click', openConfig);
document.getElementById('close-cfg').addEventListener('click', closeConfig);
document.getElementById('config-overlay').addEventListener('click', function(e) { if (e.target === this) closeConfig(); });
document.getElementById('center-btn').addEventListener('click', centerOnMe);
document.getElementById('reload-btn').addEventListener('click', reloadSectors);

try {
  if ('serviceWorker' in navigator && location.protocol === 'https:') {
    navigator.serviceWorker.register('./sw.js').catch(function() {});
  }
} catch(e) {}
</script>
